name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://jedbillyb.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy landing page (static)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: server.jedbillyb.com
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "index.html,favicon.ico,og-image.jpg,assets,extensions"
          target: "/var/www/html/jedbillyb.com"

      - name: Deploy dashboard
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: server.jedbillyb.com
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/ubuntu/server-manifest-react
            git pull origin main
            npm install
            pm2 restart manifest-dashboard
